<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Weather Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rain-container"></div>

    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="header-spacer"></div>
                <h1 class="title">🤖 <span id="app-title">Hava Durumu Agent</span></h1>
                <button id="lang-toggle" class="btn-lang" onclick="toggleLanguage()">🌍 EN</button>
            </div>
            <p class="subtitle" id="app-subtitle">Yapay zeka destekli akıllı hava durumu asistanınız</p>
        </header>

        <section class="search-section">
            <h2 class="section-title" id="section-title">📍 Şehir Seçin</h2>

            <div class="search-box">
                <input
                    type="text"
                    id="city-input"
                    placeholder="Şehir adı girin..."
                    value="Istanbul"
                >
                <button id="search-btn" class="btn btn-primary">
                    🔍 <span id="search-btn-text">Kontrol Et</span>
                </button>
            </div>

            <div class="popular-cities" id="popular-cities">
                <!-- Filled by JS -->
            </div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loading-text">Hava durumu kontrol ediliyor...</p>
        </div>

        <div id="error-box" class="error-box hidden">
            <span class="error-icon">⚠️</span>
            <p id="error-message"></p>
        </div>

        <div id="weather-result" class="weather-result hidden">
            <div class="weather-card">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="city-name">—</h2>
                        <p id="weather-description">—</p>
                    </div>
                    <div class="weather-icon-container">
                        <img id="weather-icon" src="" alt="Weather Icon">
                    </div>
                </div>

                <div class="temperature">
                    <span id="temp-value">—</span>°C
                </div>

                <div class="details-grid">
                    <div class="detail-card">
                        <div class="detail-label" id="label-humidity">💧 Nem</div>
                        <div class="detail-value" id="humidity">—%</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label" id="label-wind">💨 Rüzgar</div>
                        <div class="detail-value" id="wind">— m/s</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label" id="label-feels-like">🌡️ Hissedilen</div>
                        <div class="detail-value" id="feels-like">—°C</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label" id="label-pressure">📊 Basınç</div>
                        <div class="detail-value" id="pressure">— hPa</div>
                    </div>
                </div>
            </div>

            <div class="recommendation-card">
                <div class="recommendation-header">
                    <h3 class="recommendation-title" id="rec-title">🤖 Agent Önerileri</h3>
                    <span class="rec-source hidden" id="rec-source"></span>
                </div>
                <div class="recommendation-content" id="recommendation-content">
                    <p id="recommendation-text">—</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p id="footer-text">Powered by OpenWeatherMap API &amp; Claude AI 🚀</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
