<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Hava Durumu Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yağmur animasyonu için container -->
    <div id="rain-container"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">🤖 Hava Durumu Agent</h1>
            <p class="subtitle">Yapay zeka destekli akıllı hava durumu asistanınız</p>
        </header>

        <!-- Şehir Seçimi -->
        <section class="search-section">
            <h2 class="section-title">📍 Şehir Seçin</h2>
            
            <div class="search-box">
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="Şehir adı girin..."
                    value="Istanbul"
                >
                <button id="search-btn" class="btn btn-primary">
                    🔍 Kontrol Et
                </button>
            </div>

            <!-- Popüler şehirler -->
            <div class="popular-cities" id="popular-cities">
                <button class="city-tag">Istanbul</button>
                <button class="city-tag">Ankara</button>
                <button class="city-tag">Izmir</button>
                <button class="city-tag">Bursa</button>
                <button class="city-tag">Antalya</button>
                <button class="city-tag">Adana</button>
                <button class="city-tag">Konya</button>
                <button class="city-tag">Gaziantep</button>
            </div>
        </section>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Hava durumu kontrol ediliyor...</p>
        </div>

        <!-- Hata Mesajı -->
        <div id="error-box" class="error-box hidden">
            <span class="error-icon">⚠️</span>
            <p id="error-message"></p>
        </div>

        <!-- Hava Durumu Sonuçları -->
        <div id="weather-result" class="weather-result hidden">
            <!-- Ana Kart -->
            <div class="weather-card">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="city-name">—</h2>
                        <p id="weather-description">—</p>
                    </div>
                    <div class="weather-icon-container">
                        <img id="weather-icon" src="" alt="Weather Icon">
                    </div>
                </div>

                <div class="temperature">
                    <span id="temp-value">—</span>°C
                </div>

                <!-- Detaylar Grid -->
                <div class="details-grid">
                    <div class="detail-card">
                        <div class="detail-label">💧 Nem</div>
                        <div class="detail-value" id="humidity">—%</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label">💨 Rüzgar</div>
                        <div class="detail-value" id="wind">— m/s</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label">🌡️ Hissedilen</div>
                        <div class="detail-value" id="feels-like">—°C</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label">📊 Basınç</div>
                        <div class="detail-value" id="pressure">— hPa</div>
                    </div>
                </div>
            </div>

            <!-- Agent Önerileri -->
            <div class="recommendation-card" id="recommendation">
                <h3 class="recommendation-title">🤖 Agent Önerileri</h3>
                <div class="recommendation-content" id="recommendation-content">
                    <p id="recommendation-text">—</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by OpenWeatherMap API • Medium Yazısından Öğrendiniz 🚀</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
